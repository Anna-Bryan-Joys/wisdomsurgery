<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wisdom Surgery Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse 80% 60% at 20% 40%, rgba(42,180,180,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 80% at 85% 70%, rgba(9,29,56,0.08) 0%, transparent 55%), #f0f7f8;
      padding: 2rem;
    }
    .card {
      background: rgba(255,255,255,0.88);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(42,180,180,0.14);
      border-radius: 28px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(9,29,56,0.08);
    }
    .logo { width: 96px; height: 96px; object-fit: contain; margin: 0 auto 1.5rem; display: block; }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: #091d38;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }
    .subtitle {
      font-size: 0.9rem;
      background: linear-gradient(135deg, #2ab4b4, #1e4a7a);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    .divider { border: none; border-top: 1px solid rgba(42,180,180,0.15); margin: 1.5rem 0; }
    p {
      color: #4a6080;
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }
    .badge {
      display: inline-block;
      background: rgba(42,180,180,0.1);
      color: #2ab4b4;
      border: 1px solid rgba(42,180,180,0.25);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.3rem 0.9rem;
      letter-spacing: 0.03em;
    }
    .footer { margin-top: 2rem; color: #8faabf; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="card">
    <img src="brand_assets/WisdomSurgery_Logo_Circle.PNG" alt="Wisdom Surgery Clinic" class="logo" />
    <h1>Wisdom Surgery Clinic</h1>
    <p class="subtitle">Oral &amp; Maxillofacial Surgery · Dr Anna Raymond</p>
    <hr class="divider" />
    <p>Our new website is on its way. We can't wait to share it with you.</p>
    <span class="badge">Coming Soon</span>
    <p class="footer">© 2026 Wisdom Surgery Clinic · Brisbane, Queensland</p>
  </div>
</body>
</html>
