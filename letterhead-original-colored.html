<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Letterhead — Original Border, Site Colors</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#c4cdd4;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:48px 20px;font-family:'DM Sans',sans-serif;gap:16px;}
  .label{color:#7a8590;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;}

  .page{
    width:794px;
    height:1122px;
    position:relative;
    background:#fff;
    box-shadow:0 24px 64px rgba(0,0,0,0.3),0 4px 16px rgba(0,0,0,0.12);
    overflow:hidden;
    flex-shrink:0;
  }

  /* The original border image, full bleed, colorized via SVG filter */
  .border-img{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:fill;
    filter: url(#teal-navy);
    pointer-events:none;
    z-index:1;
  }

  /* White content area sits on top */
  .content-mask{
    position:absolute;
    /* inset matches the white paper area inside the border art */
    top:9.5%; left:8%; right:8%; bottom:9.5%;
    background:#ffffff;
    z-index:2;
  }

  /* Letterhead content */
  .content{
    position:absolute;
    top:9.5%; left:8%; right:8%; bottom:9.5%;
    z-index:3;
    display:flex;
    flex-direction:column;
    padding:22px 28px 18px;
  }

  .lh-header{
    display:grid;
    grid-template-columns:1fr 64px 1fr;
    align-items:center;
    gap:14px;
    padding-bottom:13px;
    border-bottom:1.5px solid #2ab4b4;
  }
  .lh-name{font-family:'Playfair Display',serif;font-size:14.5px;font-weight:600;color:#091d38;line-height:1.3;}
  .lh-title{font-size:10px;color:#2ab4b4;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;margin-top:2px;}
  .lh-meta{font-size:10px;color:#4a6274;line-height:1.9;margin-top:4px;}
  .lh-logo{display:flex;justify-content:center;align-items:center;}
  .lh-practice{text-align:right;}
  .lh-practice-name{font-family:'Playfair Display',serif;font-size:12px;font-weight:600;color:#091d38;letter-spacing:0.08em;text-transform:uppercase;}
  .lh-body{flex:1;}
  .lh-footer{
    border-top:1px solid rgba(42,180,180,0.3);
    padding-top:10px;
    display:flex;
    justify-content:center;
    align-items:center;
  }
</style>

<!-- SVG filter definitions — maps the grey border art into teal/navy tones -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <!-- Teal + Navy version -->
    <filter id="teal-navy" color-interpolation-filters="sRGB" x="0" y="0" width="100%" height="100%">
      <!-- Step 1: isolate the dark ink (invert so dark = bright) -->
      <feColorMatrix type="matrix"
        values="
         0  0  0  0  0.98
         0  0  0  0  0.98
         0  0  0  0  0.98
        -1 -1 -1  3  0"
        result="ink"/>
      <!-- Step 2: tint the ink — map bright ink to teal (#2ab4b4 = 0.165, 0.706, 0.706)
           with deeper areas going toward navy (#091d38 = 0.035, 0.114, 0.22) -->
      <feColorMatrix in="ink" type="matrix"
        values="
         0.08  0     0    0   0.035
         0.60  0     0    0   0.114
         0.62  0     0    0   0.20
         0     0     0    1   0"
        result="tinted"/>
      <!-- Step 3: blend back over white background -->
      <feBlend in="tinted" in2="SourceGraphic" mode="multiply"/>
    </filter>
  </defs>
</svg>

</head>
<body>
<div class="label">Option 3 — Original Border, Site Colors</div>
<div class="page">

  <!-- Original border artwork, colorized -->
  <img class="border-img" src="brand_assets/letterhead-border-raw.png" alt=""/>

  <!-- White knockout over the inner paper area -->
  <div class="content-mask"></div>

  <!-- Letterhead content -->
  <div class="content">
    <div class="lh-header">
      <div>
        <div class="lh-name">Dr Anna Raymond</div>
        <div class="lh-title">Oral and Maxillofacial Surgeon</div>
        <div class="lh-meta">Provider Number: 433358WW</div>
      </div>
      <div class="lh-logo">
        <img src="brand_assets/WisdomSurgery_Logo_Circle.PNG" alt="" style="width:58px;height:58px;object-fit:contain;"/>
      </div>
      <div class="lh-practice">
        <div class="lh-practice-name">Wisdom Surgery Clinic</div>
        <div class="lh-meta">hello@wisdomsurgery.clinic<br/>Phone: <strong style="color:#091d38;">1300 111 324</strong></div>
      </div>
    </div>
    <div class="lh-body"></div>
    <div class="lh-footer">
      <img src="brand_assets/Wisdomsurgery Clinic logo - stamp version-Picsart-BackgroundRemover.PNG" alt="WISDOMSURGERY.CLINIC" style="height:34px;opacity:0.7;"/>
    </div>
  </div>

</div>
</body>
</html>
